<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人管理 - Todo</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main class="page account-page">
        <section class="panel account-panel">
            <p class="eyebrow">Account</p>
            <h1>{{ .CurrentUser.DisplayName }}</h1>
            <p class="hero-copy">个人管理</p>

            <div class="account-actions">
                <a href="/" class="secondary action-link">返回今天</a>
                {{ if .CurrentUser.IsAdmin }}
                <a href="/admin/users" class="secondary action-link">用户审批</a>
                {{ end }}
                <form action="/logout" method="post">
                    <button type="submit" class="secondary">退出登录</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
