<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人管理 - Todo</title>
    <meta name="theme-color" content="#c56d3a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Todo">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/pwa/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/pwa/favicon-16.png">
    <link rel="apple-touch-icon" href="/static/pwa/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/styles.css">
    <script defer src="/static/pwa-register.js"></script>
</head>
<body>
    <main class="page account-page">
        <section class="panel account-panel">
            <p class="eyebrow">Account</p>
            <h1>{{ .CurrentUser.DisplayName }}</h1>
            <p class="hero-copy">个人管理</p>

            <div class="account-actions">
                <a href="/" class="secondary action-link">返回今天</a>
                {{ if .CurrentUser.IsAdmin }}
                <a href="/admin/users" class="secondary action-link">用户审批</a>
                {{ end }}
                <form action="/logout" method="post">
                    <button type="submit" class="secondary">退出登录</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
