<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe6;
            --panel: rgba(255, 251, 245, 0.94);
            --ink: #26211b;
            --muted: #706458;
            --accent: #c56d3a;
            --line: rgba(38, 33, 27, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "IBM Plex Sans", "PingFang SC", "Noto Sans SC", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(197, 109, 58, 0.18), transparent 32%),
                radial-gradient(circle at right 20%, rgba(107, 155, 118, 0.16), transparent 26%),
                linear-gradient(180deg, #f8f4ec 0%, #efe5d6 100%);
        }

        .offline-panel {
            width: min(460px, 100%);
            padding: 28px 24px;
            border-radius: 24px;
            border: 1px solid var(--line);
            background: var(--panel);
            text-align: center;
            box-shadow: 0 18px 42px rgba(72, 43, 20, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 8vw, 2.8rem);
            line-height: 1.06;
            font-family: "Iowan Old Style", "Songti SC", serif;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        strong {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <main class="offline-panel">
        <h1>Todo</h1>
        <p><strong>当前离线。</strong> 网络恢复后重新打开页面，就能继续查看和操作任务。</p>
    </main>
</body>
</html>
