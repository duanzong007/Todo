services:
  db:
    image: postgres:16-alpine
    container_name: todo-db
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - todo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ADDR: ":8080"
      APP_TIMEZONE: Asia/Shanghai
      AUTO_MIGRATE: "true"
      MIGRATIONS_DIR: db/migrations
      ICS_IMPORT_HORIZON_DAYS: "180"
      SESSION_COOKIE_NAME: todo_session
      SESSION_TTL_HOURS: "720"
      SESSION_SECURE_COOKIE: "false"
      SSO_PROVIDER_NAME: soid
      SSO_ISSUER_URL: ${SSO_ISSUER_URL:-}
      SSO_CLIENT_ID: ${SSO_CLIENT_ID:-}
      SSO_CLIENT_SECRET: ${SSO_CLIENT_SECRET:-}
      SSO_REDIRECT_URL: ${SSO_REDIRECT_URL:-}
      SSO_ANDROID_REDIRECT_URL: ${SSO_ANDROID_REDIRECT_URL:-todo-shell://auth/sso/callback}
      SSO_SCOPES: ${SSO_SCOPES:-openid profile email}
      SSO_AUTO_REGISTER: ${SSO_AUTO_REGISTER:-true}
      SSO_AUTO_APPROVE: ${SSO_AUTO_APPROVE:-true}
      DATABASE_URL: postgres://todo:todo@db:5432/todo?sslmode=disable
    ports:
      - "8080:8080"

volumes:
  todo_pg_data:
